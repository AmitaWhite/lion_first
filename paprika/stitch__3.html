<script>
        // Simple Interaction logic for form focus states
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.querySelector('label')?.classList.add('text-primary');
            });
            el.addEventListener('blur', () => {
                el.parentElement.querySelector('label')?.classList.remove('text-primary');
            });
        });

        // Trade method toggle visual logic
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', function() {
                const icon = this.parentElement.querySelector('.material-symbols-outlined');
                if (this.checked) {
                    icon.style.fontVariationSettings = "'FILL' 1";
                } else {
                    icon.style.fontVariationSettings = "'FILL' 0";
                }
            });
        });
    </script>
